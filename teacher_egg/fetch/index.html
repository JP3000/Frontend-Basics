<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>单身狗网站</title>
</head>
<body>
    <button>点击获取单身狗照片</button>
    <img src="" alt="">
    <script>
        // fetch会发送HTTP请求给服务器，在不刷新网页的前提下，可以实现局部内容的更新
        // let wtf = fetch('https://randomfox.ca/floof/');
        // console.log(wtf);

        const button = document.querySelector('button');
        const img = document.querySelector('img');

        button.addEventListener('click', () => {
            fetch('https://randomfox.ca/floof/')
                .then( response => {
                    if (response.ok) { // 判断服务器是否成功返回数据
                        return response.json(); // 将服务器返回的数据转换为JSON格式
                    } else {
                        throw new Error('网络请求失败'); // 抛出错误信息
                    }
                }) // 将服务器返回的数据转换为JSON格式
                .then( data => img.src = data.image ) // 输出转换后的数据，并更新img标签的src属性
        })
  
        
    </script>
</body>
</html>
